<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anomaly Monitor Dark Preview</title>
  <style>
    :root { color-scheme: dark; --bg:#071015; --panel:#0d1b22; --line:#25404a; --cyan:#65d9ff; --red:#ff4d5f; --text:#d6edf3; --muted:#7f9ba5; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at 50% 10%, #132934, var(--bg) 60%); font-family:Inter, system-ui, sans-serif; color:var(--text); }
    .console { width:min(1040px, 92vw); border:1px solid var(--line); background:linear-gradient(180deg, #0b1820, #071015); box-shadow:0 24px 80px #000a; border-radius:24px; padding:24px; }
    .top { display:flex; justify-content:space-between; gap:16px; align-items:center; margin-bottom:18px; }
    .title { letter-spacing:.18em; text-transform:uppercase; color:var(--cyan); font-weight:700; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip { border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:6px 10px; font-size:12px; }
    .grid { display:grid; grid-template-columns:1.55fr .9fr; gap:16px; }
    .monitor { min-height:380px; border:1px solid #315463; border-radius:18px; background:linear-gradient(160deg,#142d36,#05090c); position:relative; overflow:hidden; }
    .monitor:before { content:""; position:absolute; inset:0; background:repeating-linear-gradient(0deg, transparent 0 4px, #ffffff08 5px), radial-gradient(circle at 35% 35%, #65d9ff22, transparent 36%); }
    .alert { position:absolute; left:18px; bottom:18px; color:var(--red); font-family:ui-monospace, monospace; font-size:13px; letter-spacing:.08em; }
    .side { display:grid; gap:12px; }
    .card { border:1px solid var(--line); border-radius:16px; padding:16px; background:#09151bdd; }
    .card h3 { margin:0 0 12px; font-size:13px; color:var(--cyan); letter-spacing:.12em; text-transform:uppercase; }
    .buttons { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    button { border:1px solid #45616c; background:#10242d; color:var(--text); border-radius:14px; padding:14px 10px; font-weight:700; }
    button.danger { border-color:#7a2c38; color:#ffd6db; background:#321017; }
    @media (max-width: 760px){ .grid{grid-template-columns:1fr}.monitor{min-height:320px}.top{align-items:flex-start; flex-direction:column} }
  </style>
</head>
<body>
  <main class="console">
    <div class="top"><div class="title">Anomaly Monitor Dark</div><div class="chips"><span class="chip">CCTV PRIMARY</span><span class="chip">HUD CHIPS</span><span class="chip">ICON-FIRST</span></div></div>
    <section class="grid">
      <div class="monitor"><div class="alert">SIGNAL DRIFT // FLOOR: -- // DOOR: UNTRUSTED</div></div>
      <aside class="side"><div class="card"><h3>Telemetry</h3><div class="chips"><span class="chip">PWR 63%</span><span class="chip">ANOM 41</span><span class="chip">LOCK 02</span></div></div><div class="card"><h3>Control</h3><div class="buttons"><button>▲</button><button>▼</button><button>OPEN</button><button class="danger">STOP</button></div></div></aside>
    </section>
  </main>
</body>
</html>
